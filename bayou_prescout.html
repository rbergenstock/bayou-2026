*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0D1A;color:#E0E0E0;font-family:'Source Sans 3',sans-serif;font-size:15px}
h1,h2,h3,.stat-val,.tier-label{font-family:'Oswald',sans-serif}
a{color:#C9A84C;text-decoration:none}

.header{background:#2A2957;padding:20px 24px;border-bottom:3px solid #C9A84C;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{color:#C9A84C;font-size:28px;letter-spacing:1px}
.header .sub{color:#aaa;font-size:14px}
.header .event-info{color:#fff;font-size:14px;text-align:right}

.stats-bar{display:flex;gap:0;background:#1A1A2E;border-bottom:1px solid #333}
.stat-box{flex:1;text-align:center;padding:16px 8px;border-right:1px solid #333}
.stat-box:last-child{border-right:none}
.stat-val{font-size:32px;color:#C9A84C;font-weight:700}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.controls{padding:16px 24px;background:#12122a;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #333}
.controls label{color:#aaa;font-size:13px}
.controls select,.controls input{background:#1A1A2E;color:#fff;border:1px solid #444;padding:8px 12px;border-radius:4px;font-size:14px;font-family:'Source Sans 3',sans-serif}
.controls select:focus,.controls input:focus{outline:none;border-color:#C9A84C}
.btn{background:#2A2957;color:#C9A84C;border:1px solid #C9A84C;padding:8px 16px;border-radius:4px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:0.5px}
.btn:hover{background:#C9A84C;color:#0D0D1A}
.btn.active{background:#C9A84C;color:#0D0D1A}

.content{padding:20px 24px}

.tier-section{margin-bottom:28px}
.tier-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #333}
.tier-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.tier-label{font-size:20px;color:#fff;font-weight:600}
.tier-count{color:#888;font-size:14px;margin-left:auto}

.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.team-card{background:#1A1A2E;border:1px solid #2a2a40;border-radius:6px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color 0.2s}
.team-card:hover{border-color:#C9A84C;transform:scale(2);transition:all 0.2s;z-index:10;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.7)}
a .team-card{cursor:pointer;transform-origin:center center}
.team-card.has-opr{border-left:3px solid #4CAF50}
.team-card.rookie{border-left:3px solid #FF9800}

.team-num{font-family:'Oswald',sans-serif;font-size:36px;color:#C9A84C;font-weight:700;line-height:1;min-width:65px}
.team-info{flex:1}
.team-name{font-size:20px;font-weight:700;color:#fff;line-height:1.2}
.team-loc{font-size:14px;color:#888;margin-top:2px;font-weight:600}
.team-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.team-tag{font-size:13px;padding:3px 10px;border-radius:10px;background:#2A2957;color:#aaa;font-weight:600}
.team-tag.vet{background:#1b3a1b;color:#4CAF50}
.team-tag.exp{background:#2a2a00;color:#C9A84C}
.team-tag.new{background:#3a2200;color:#FF9800}
.team-tag.rookie26{background:#3a0000;color:#F44336}
.team-tag.opr{background:#0d2d0d;color:#4CAF50;font-weight:700;font-size:14px}
.team-tag.arli{background:#2A2957;color:#C9A84C;font-weight:700}

.opr-bar{margin-top:6px;height:8px;background:#222;border-radius:3px;overflow:hidden}
.opr-fill{height:100%;border-radius:3px;transition:width 0.5s}
.intel-note{margin-top:6px;font-size:14px;color:#aaa;font-style:italic;line-height:1.3;border-top:1px solid #2a2a40;padding-top:5px;font-weight:600}

.print-section{display:none}

/* Checklist styles */
.checklist{width:100%}
.checklist table{width:100%;border-collapse:collapse;font-size:13px}
.checklist th{background:#2A2957;color:#C9A84C;padding:8px 12px;text-align:left;font-family:'Oswald',sans-serif;font-size:14px;position:sticky;top:0}
.checklist td{padding:6px 12px;border-bottom:1px solid #222}
.checklist tr:hover{background:#1A1A2E}
.checklist .priority-1{color:#F44336;font-weight:600}
.checklist .priority-2{color:#FF9800;font-weight:600}
.checklist .priority-3{color:#C9A84C}
.checklist .priority-4{color:#4CAF50}
.checkbox{width:18px;height:18px;accent-color:#C9A84C}

.view-toggle{display:flex;gap:0;margin-bottom:0}
.view-btn{padding:10px 20px;background:#1A1A2E;color:#888;border:1px solid #333;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px}
.view-btn:first-child{border-radius:4px 0 0 4px}
.view-btn:last-child{border-radius:0 4px 4px 0}
.view-btn.active{background:#C9A84C;color:#0D0D1A;border-color:#C9A84C}

.notes-box{font-family:'Source Sans 3',sans-serif;background:#1A1A2E;border:1px solid #333;color:#E0E0E0;padding:12px;border-radius:4px;margin-top:16px;font-size:14px;line-height:1.6}
.notes-box h3{color:#C9A84C;margin-bottom:8px}

@media print{
  body{background:#fff;color:#000}
  .header{background:#2A2957;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .controls,.stats-bar{display:none}
  .team-card{border:1px solid #ccc;break-inside:avoid}
  .team-num{color:#2A2957}
  .team-name{color:#000}
  .print-section{display:block}
}
</style>

function getTier(t){
  if(t.rookie<=2015) return {id:'tier1',label:'Tier 1 — Veteran',color:'#F44336',css:'vet'};
  if(t.rookie<=2023) return {id:'tier2',label:'Tier 2 — Contender',color:'#FF9800',css:'exp'};
  if(t.rookie<=2025) return {id:'tier3',label:'Tier 3 — Newer',color:'#FF9800',css:'new'};
  return {id:'tier3',label:'Tier 3 — Rookie 2026',color:'#FF9800',css:'rookie26'};
}

function getPitPriority(t){
  if(t.rookie===2026) return {num:1,label:'P1',css:'priority-1'};
  if(t.rookie>=2024) return {num:2,label:'P2',css:'priority-2'};
  if(t.rookie>=2020) return {num:3,label:'P3',css:'priority-3'};
  return {num:4,label:'P4',css:'priority-4'};
}

function getFiltered(){
  const filter = document.getElementById('tierFilter').value;
  const search = document.getElementById('search').value.toLowerCase();
  let list = TEAMS;
  if(filter==='tier1') list = list.filter(t=>t.rookie<=2015);
  else if(filter==='tier2') list = list.filter(t=>t.rookie>=2016&&t.rookie<=2023);
  else if(filter==='tier3') list = list.filter(t=>t.rookie>=2024);
  else if(filter==='arli') list = list.filter(t=>ARLI_OPR[t.n]!==undefined);
  else if(filter==='opr') list = list.filter(t=>ARLI_OPR[t.n]!==undefined);
  else if(filter==='hasdata') list = list.filter(t=>PRIOR[t.n]!==undefined);
  else if(filter==='nodata') list = list.filter(t=>!PRIOR[t.n]);
  else if(filter==='winners') list = list.filter(t=>PRIOR[t.n]&&PRIOR[t.n].won);
  else if(filter==='top10'){ list = list.filter(t=>OPR_DATA[t.n]); list.sort((a,b)=>(OPR_DATA[b.n]?.best||0)-(OPR_DATA[a.n]?.best||0)); list = list.slice(0,10); }
  else if(filter==='captains'){ const caps = [4635,8044,3478,3937,4087,16,2183,2992]; list = list.filter(t=>caps.includes(t.n)); list.sort((a,b)=>caps.indexOf(a.n)-caps.indexOf(b.n)); }
  else if(filter==='warnings'){ const warns = [9309,9405,2080,1902]; list = list.filter(t=>warns.includes(t.n)); }
  if(search) list = list.filter(t=>String(t.n).includes(search)||t.name.toLowerCase().includes(search));
  return list;
}

  html += '</table></div>';
  
  html += `<div class="notes-box" style="margin-top:20px">
    <h3>🎯 PRIORITY KEY</h3>
    <span class="priority-1">P1</span> = 2026 Rookies (6 teams) — complete unknowns, pit scout FIRST<br>
    <span class="priority-2">P2</span> = 2024–2025 teams (14 teams) — limited history, high value pit intel<br>
    <span class="priority-3">P3</span> = 2020–2023 teams (4 teams) — some experience, still worth a visit<br>
    <span class="priority-4">P4</span> = Veterans ≤2019 (30 teams) — match scouting tells the story
  </div>`;
  return html;
}

function render(){
  const teams = getFiltered();
  const el = document.getElementById('content');
  el.innerHTML = currentView==='cards' ? renderCards(teams) : renderChecklist(teams);
  
  // Stats bar
  const all = TEAMS;
  document.getElementById('statsBar').innerHTML = [
    {v:all.length,l:'TEAMS'},
    {v:all.filter(t=>t.rookie<=2015).length,l:'VETERANS'},
    {v:all.filter(t=>t.rookie>=2016&&t.rookie<=2023).length,l:'CONTENDERS'},
    {v:all.filter(t=>t.rookie>=2024).length,l:'UNKNOWNS'},
    {v:Object.keys(PRIOR).length,l:'HAVE DATA'},
    {v:Object.values(PRIOR).filter(p=>p.won).length,l:'EVENT WINNERS'},
    {v:Object.keys(EPA_DATA).length,l:'HAVE EPA'},
    {v:all.filter(t=>t.rookie===2026).length,l:'ROOKIES'}
  ].map(s=>`<div class="stat-box"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
}

render();

document.addEventListener('mouseenter', function(e) {
  const card = e.target.closest('.team-card');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const vw = window.innerWidth;
  let ox = 'center';
  if (rect.left < 200) ox = 'left';
  else if (rect.right > vw - 200) ox = 'right';
  card.style.transformOrigin = ox + ' center';
}, true);
</script>
</body>
</html>
